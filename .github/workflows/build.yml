name: build

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15, macos-15-intel]

    steps:
      - uses: actions/checkout@v6
        with:
          repository: schrodinger/pymol-open-source
          ref: 125054d93676ff6d3f09b827b9b76f3c568b3a61

      - name: Clone pymol
        run: |
          git clone https://github.com/rcsb/mmtf-cpp.git
          mv mmtf-cpp/include/mmtf* include/
          rm -rf mmtf-cpp

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Build Wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_SKIP: pp* *musllinux* gp* cp38* cp39*
          CIBW_ARCHS: auto64
          #CIBW_ARCHS_MACOS: x86_64 arm64
          #CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_BUILD_MACOS: brew install catch2 freeglut freetype glew glm libpng libxml2 msgpack msgpack-cxx netcdf sip numpy
          CIBW_BEFORE_BUILD_LINUX: dnf install -y epel-release && dnf install -y gcc gcc-c++ kernel-devel freeglut-devel glew-devel libpng-devel freetype-devel msgpack-devel libxml2-devel glm-devel netcdf-devel
          CIBW_ENVIRONMENT_MACOS: >
            CFLAGS="-I/opt/homebrew/include -I/usr/local/include"
            CXXFLAGS="-I/opt/homebrew/include -I/usr/local/include"
            LDFLAGS="-L/opt/homebrew/lib -L/usr/local/lib"
            CPPFLAGS="-I/usr/local/opt/freetype2/include/freetype2"
            MACOSX_DEPLOYMENT_TARGET=11.0

      - run: ls -l wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl

      - name: Deployment
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./wheelhouse/*.whl
